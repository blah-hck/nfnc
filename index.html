            color: #ffffff;

        body::before {

        }
        .container {

            flex-wrap: wrap;

        .user-card {

            align-items: center;

            transition: transform 0.2s;

        .user-card:hover { transform: scale(1.05); }

        /* #4REEL */
        .avatar-wrap {
            position: relative;
            width: 85px;
            height: 85px;
            border-radius: 50%;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #222;
            object-fit: cover;
            background: #111;
            position: relative;
            z-index: 2;
        }
        .avatar-decoration {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 125px;
            height: 125px;
            z-index: 3;
            pointer-events: none;
            image-rendering: crisp-edges;
        }

        .status-dot {
            position: absolute;
            bottom: 3px;
            right: 3px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #000;
            background: #80848e;
            z-index: 4;

        .status-online { background: #23a55a; }

        .status-dnd { background: #f23f43; }
        .username {

        #splash {

            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;

        .prof-avatar {

        .prof-status-big {

    <script>
        function hideSplash() {
            const splash = document.getElementById('splash');
            const audio = document.getElementById('bgAudio');
            splash.classList.add('fade-out');
            setTimeout(() => splash.classList.add('hidden'), 500);
            audio.volume = 0.25;
            audio.play().catch(e => console.log(e));
        }

        function formatTime(start) {
            if(!start) return "";
            const now = Date.now();
            const diff = Math.floor((now - start) / 1000);
            if(diff < 60) return "Just started";
            const h = Math.floor(diff / 3600);
            const m = Math.floor((diff % 3600) / 60);
            if(h > 0) return `${h}h ${m}m elapsed`;
            return `${m}m elapsed`;
        }

        // #4REEL
        async function getFullDecoration(userId) {
            try {
                // Kunin ang buong profile data mula Lanyard
                const lanyardRes = await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
                const lanyardData = await lanyardRes.json();
                const user = lanyardData.data.discord_user;
                
                if(user.avatar_decoration) {
                    // #4REEL
                    const decoId = user.avatar_decoration.replace("v1:", "");
                    return `https://cdn.discordapp.com/avatar-decoration-presets/${decoId}.png?size=256`;
                }
                return null;
            } catch {
                return null;
            }
        }

        async function openProfile(data, avatar) {
            const u = data.discord_user;
            const status = data.discord_status;
            const statusText = {
                online: "Online", idle: "Idle", dnd: "Do Not Disturb", offline: "Offline"
            };

            const bannerEl = document.getElementById('profBanner');
            const decoEl = document.getElementById('profAvatarDeco');
            bannerEl.src = u.banner ? `https://cdn.discordapp.com/banners/${u.id}/${u.banner}.png?size=512` : "https://i.imgur.com/0ihl3E4.jpeg";
            
            // #4REEL
            const fullDecoUrl = await getFullDecoration(u.id);
            if(fullDecoUrl) {
                decoEl.src = fullDecoUrl;
                decoEl.style.display = "block";
            } else {
                decoEl.style.display = "none";
            }

            document.getElementById('profAvatar').src = avatar;
            const statusEl = document.getElementById('profStatusBig');
            statusEl.className = "prof-status-big";
            if(status === 'online') statusEl.classList.add('status-online');
            if(status === 'idle') statusEl.classList.add('status-idle');
            if(status === 'dnd') statusEl.classList.add('status-dnd');
            document.getElementById('profStatusText').textContent = statusText[status];
            document.getElementById('profNameBig').textContent = u.global_name || u.username;

            const actBox = document.getElementById('activityBox');
            let finalHtml = `<p class="activity-title">CURRENT STATUS</p><p class="activity-details">Available</p>`;

            if(data.activities && data.activities.length > 0) {
                const spotifyAct = data.activities.find(a => a.type === 2 || a.name === "Spotify");
                const gameAct = data.activities.find(a => a.type === 0);

                if(spotifyAct) {
                    finalHtml = `
                        <p class="activity-title">🎵 LISTENING TO SPOTIFY</p>
                        <p class="activity-name">${spotifyAct.details || "Unknown Track"}</p>
                        <p class="activity-details">by ${spotifyAct.state || "Unknown Artist"}</p>
                    `;
                } else if(gameAct) {
                    let gameName = gameAct.name;
                    if(gameName.toLowerCase().includes("roblox")) gameName = "ROBLOX";
                    else if(gameName.toLowerCase().includes("fivem") || gameName.toLowerCase().includes("gta")) gameName = "FiveM / GTA V";

                    const timeText = formatTime(gameAct.timestamps?.start);
                    finalHtml = `
                        <p class="activity-title">🎮 PLAYING</p>
                        <p class="activity-name">${gameName}</p>
                        ${gameAct.details ? `<p class="activity-details">${gameAct.details}</p>` : ""}
                        ${timeText ? `<p class="activity-details">${timeText}</p>` : ""}
                    `;
                } else {
                    const act = data.activities[0];
                    finalHtml = `
                        <p class="activity-title">ACTIVITY</p>
                        <p class="activity-name">${act.name}</p>
                    `;
                }
            }
            actBox.innerHTML = finalHtml;
            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeProfileModal() { document.getElementById('profileModal').style.display = 'none'; }
        function closeServerModal() { document.getElementById('serverModal').style.display = 'none'; }
        window.onclick = e => {
            if(e.target === document.getElementById('profileModal')) closeProfileModal();
            if(e.target === document.getElementById('serverModal')) closeServerModal();
        }

                card.innerHTML = `
