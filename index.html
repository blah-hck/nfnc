<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#4REEL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            color: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
            background: #000000 url("https://i.imgur.com/0ihl3E4.jpeg") center top / contain no-repeat fixed;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 0;
            pointer-events: none;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: clamp(2.5rem, 10vw, 3.5rem);
            letter-spacing: 4px;
            margin: 20px 0 50px;
            text-transform: uppercase;
            font-family: Arial Black, Impact, Helvetica Bold, sans-serif;
            font-weight: 900;
            text-shadow: 0 0 12px rgba(255,255,255,0.2);
        }
        .section-title {
            font-size: 1rem;
            color: #cccccc;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 35px 0 20px;
        }
        .grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
        }
        .user-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .user-card:hover { transform: scale(1.05); }
        .avatar-wrap {
            position: relative;
            width: 85px;
            height: 85px;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #222;
            object-fit: cover;
            background: #111;
        }
        .status-dot {
            position: absolute;
            bottom: 3px;
            right: 3px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #000;
            background: #80848e;
        }
        .status-online { background: #23a55a; }
        .status-idle { background: #f0b232; }
        .status-dnd { background: #f23f43; }
        .username {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #ccc;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #splash {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }
        #splash.fade-out { opacity: 0; pointer-events: none; }
        #splash.hidden { display: none; }
        #splash .main-text {
            font-size: clamp(2rem, 7vw, 2.8rem);
            font-family: Arial Black, Impact, sans-serif;
            text-transform: uppercase;
        }
        #splash .tap-text { font-size: 1.1rem; color: #aaa; margin-top: 10px; }
        .marquee-wrapper { width: 100%; overflow: hidden; margin-top: 20px; }
        .marquee-content { display: flex; gap: 25px; animation: scroll 30s linear infinite; width: max-content; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .hub-container {
            margin-top: 20px;
            padding: 15px;
            background: rgba(18,18,18,0.7);
            border: 1px solid #2a2a2a;
            border-radius: 6px;
        }
        .server-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin: 8px 0;
            background: rgba(30,30,30,0.6);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .server-card:hover { background: rgba(40,40,40,0.8); }
        .server-info { display: flex; align-items: center; gap: 12px; }
        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid #333;
            object-fit: cover;
        }
        .server-details h4 { font-size: 0.95rem; color: #fff; margin-bottom: 2px; }
        .server-details p { font-size: 0.8rem; color: #999; }
        #serverModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
        }
        .modal-content {
            width: 100%;
            max-width: 380px;
            background: rgba(25,25,25,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
        }
        .modal-content h3 { font-size: 1.8rem; margin-bottom: 15px; }
        .modal-content p { font-size: 1rem; color: #aaa; margin-bottom: 25px; }
        .modal-join {
            display: inline-block;
            padding: 10px 25px;
            background: rgba(45,125,70,0.3);
            border: 1px solid rgba(45,125,70,0.5);
            border-radius: 6px;
            color: #fff;
            text-decoration: none;
        }
        .close-modal {
            margin-top: 20px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* ✅ PERFECT PROFILE - HANDANG-HANDA SA MGA BANNER */
        #profileModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 15px;
            z-index: 10001;
        }
        .profile-card {
            width: 100%;
            max-width: 320px;
            background: rgba(35, 36, 41, 0.7);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
        }
        .profile-banner {
            height: 100px;
            background: #2b2d31; /* ✅ DEFAULT KULAY KUNG WALANG BANNER */
            position: relative;
            overflow: hidden;
        }
        .profile-banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* ✅ ITATAGO KUNG WALANG BANNER */
        }
        .close-profile {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.4);
            border: none;
            color: #fff;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            z-index: 2;
        }
        .prof-body {
            padding: 0 20px 25px;
            margin-top: -40px;
            position: relative;
        }
        .avatar-container {
            position: relative;
            width: 80px;
            height: 80px;
        }
        .prof-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid rgba(35, 36, 41, 0.9);
            background: #333;
            object-fit: cover;
        }
        .prof-status-big {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 3px solid rgba(35, 36, 41, 0.9);
            background: #72767d;
        }
        .prof-status-big.status-online { background: #23a559; }
        .prof-status-big.status-idle { background: #f0b132; }
        .prof-status-big.status-dnd { background: #f23f43; }

        .prof-header { margin-top: 15px; text-align: left; }
        .prof-name-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .prof-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
        }
        .prof-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(50, 52, 58, 0.6);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.8rem;
            color: #fff;
        }
        .badge-icon { color: #ffcc00; }
        .prof-tag {
            font-size: 0.95rem;
            color: #b9bbbe;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div id="splash" onclick="hideSplash()">
        <div class="main-text">THE WORLD IS YOURS</div>
        <div class="tap-text">TAP THE SCREEN</div>
    </div>

    <div class="container">
        <h1> </h1>

        <script>
        const MY_PROFILE_ID = "1497306715715010620"; // PURESKILLS
        const MY_WEBSITE = "https://blah-hck.github.io/blah/"; // BOBO

        
        const members = {
            topRow: [ {id: "1467935676694532408"}, {id: MY_PROFILE_ID}, {id: "901323764665573437"} ],
            aboveAll: [ {id: "1512264636496351456"}, {id: "1392396268558356534"}, {id: "1495784072029540526"}, {id: "1259504569193463848"}, {id: "1421541305309335643"} ],
            topShotta: [ {id: "1504842889145090329"}, {id: " "}, {id: " "} ],
            dayOnes: [ {id: "1520237144990285907"}, {id: "1390177882755829851"}, {id: "1517855862004383916"}, {id: "1364578189153796106"}, {id: "1513550327335616700"}, {id: "1284500317878354043"}, {id: "1368224386192248903"}, {id: "1509144884211351672"}, {id: "1456301481031372905"} ]
        };
        </script>

        <div class="section-title">Top Row</div>
        <div class="grid" id="topRowGrid"></div>

        <div class="section-title">ABOVE ALL</div>
        <div class="grid" id="aboveAllGrid"></div>

        <div class="section-title">TOP SHOTTA</div>
        <div class="grid" id="topShottaGrid"></div>

        <div class="section-title">DAY ONES</div>
        <div class="marquee-wrapper"><div class="marquee-content" id="dayOnesMarquee"></div></div>

        <div class="section-title">COMMUNITY HUB</div>
        <div class="hub-container" id="hubContainer"></div>
    </div>

    <div id="serverModal">
        <div class="modal-content">
            <h3 id="modalName"></h3>
            <p id="modalInfo"></p>
            <a href="" id="modalLink" target="_blank" class="modal-join">Click Here</a>
            <br><button class="close-modal" onclick="closeServerModal()">Close</button>
        </div>
    </div>

    
    <div id="profileModal">
        <div class="profile-card">
            <div class="profile-banner">
                <img class="profile-banner-img" id="profBanner" alt="">
                <button class="close-profile" onclick="closeProfileModal()">&times;</button>
            </div>
            <div class="prof-body">
                <div class="avatar-container">
                    <img class="prof-avatar" id="profAvatar" src="">
                    <div class="prof-status-big" id="profStatusBig"></div>
                </div>

                <div class="prof-header">
                    <div class="prof-name-row">
                        <h3 class="prof-name" id="profName">—</h3>
                        <div class="prof-badge">
                            <span class="badge-icon">⚡</span>
                            <span id="badgeText">1337</span>
                        </div>
                    </div>
                    <p class="prof-tag" id="profTag">@username</p>
                </div>
            </div>
        </div>
    </div>

    <audio id="bgAudio" loop preload="auto" style="display:none;">
        <source src="https://www.image2url.com/r2/default/audio/1782390881799-61def1ab-afbd-453d-ae39-f6aff7d67d0b.mp3">
    

    <script>
        function hideSplash() {
            const splash = document.getElementById('splash');
            const audio = document.getElementById('bgAudio');
            splash.classList.add('fade-out');
            setTimeout(() => splash.classList.add('hidden'), 500);
            audio.volume = 0.25;
            audio.play().catch(e => console.log(e));
        }

        
        function openProfile(data, defAvatar) {
            const user = data?.discord_user || {};
            const status = data?.discord_status || 'offline';

            // ✅ PANGALAN & TAG
            document.getElementById('profName').innerText = user.global_name || user.username || 'Unknown';
            document.getElementById('profTag').innerText = '@' + (user.username || 'unknown');

            // ✅ BADGE
            document.getElementById('badgeText').innerText = '1337';

            // ✅ AVATAR
            document.getElementById('profAvatar').src = user.avatar 
                ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=256` 
                : defAvatar;
            
            // ✅ BANNER LOGIC: KUNG MERON, LALABAS PERFECT; KUNG WALA, WALANG ERROR
            const bannerImg = document.getElementById('profBanner');
            if (user.banner) {
                bannerImg.src = `https://cdn.discordapp.com/users/${user.id}/${user.banner}.png?size=512`;
                bannerImg.style.display = 'block';
            } else {
                bannerImg.style.display = 'none';
            }

            // ✅ STATUS
            const statusEl = document.getElementById('profStatusBig');
            statusEl.className = 'prof-status-big';
            if (status === 'online') statusEl.classList.add('status-online');
            else if (status === 'idle') statusEl.classList.add('status-idle');
            else if (status === 'dnd') statusEl.classList.add('status-dnd');

            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeProfileModal() { document.getElementById('profileModal').style.display = 'none'; }
        function closeServerModal() { document.getElementById('serverModal').style.display = 'none'; }
        window.onclick = e => {
            if(e.target === document.getElementById('profileModal')) closeProfileModal();
            if(e.target === document.getElementById('serverModal')) closeServerModal();
        }

        
        async function makeCard(userId) {
            const card = document.createElement("div");
            card.className = "user-card";

            if (!userId || !userId.trim()) {
                card.innerHTML = `
                    <div class="avatar-wrap">
                        <img class="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png">
                        <div class="status-dot"></div>
                    </div>
                    <div class="username">Unknown</div>
                `;
                card.onclick = () => openProfile(null, "https://cdn.discordapp.com/embed/avatars/0.png");
                return card;
            }

            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
                const data = await res.json();
                const d = data.data || {};
                const avatarUrl = d.discord_user?.avatar ? `https://cdn.discordapp.com/avatars/${userId}/${d.discord_user.avatar}.png?size=128` : "https://cdn.discordapp.com/embed/avatars/0.png";

                card.innerHTML = `
                    <div class="avatar-wrap">
                        <img class="avatar" src="${avatarUrl}" loading="lazy">
                        <div class="status-dot status-${d.discord_status || 'offline'}"></div>
                    </div>
                    <div class="username">${d.discord_user?.global_name || d.discord_user?.username || '???'}</div>
                `;

                card.onclick = () => {
                    if(userId === MY_PROFILE_ID) window.open(MY_WEBSITE, "_blank");
                    else openProfile(d, avatarUrl);
                };
            } catch {
                card.innerHTML = `
                    <div class="avatar-wrap">
                        <img class="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png">
                        <div class="status-dot"></div>
                    </div>
                    <div class="username">Unknown</div>
                `;
                card.onclick = () => openProfile(null, "https://cdn.discordapp.com/embed/avatars/0.png");
            }
            return card;
        }

        async function renderGrid(id, list) {
            const grid = document.getElementById(id);
            for(const u of list) grid.appendChild(await makeCard(u.id));
        }
        async function renderMarquee(list) {
            const box = document.getElementById("dayOnesMarquee");
            for(let i=0; i<2; i++) for(const u of list) box.appendChild(await makeCard(u.id));
        }
        async function loadAll() {
            renderGrid("topRowGrid", members.topRow);
            renderGrid("aboveAllGrid", members.aboveAll);
            renderGrid("topShottaGrid", members.topShotta);
            renderMarquee(members.dayOnes);
        }
        loadAll();

        const allyServers = [
            { name: "BLAH #ALBTHAX", invite: "Ty7qb4thSs", guildId: "1504217597900755075", icon: "335c5d2498dbf8b0ab834b022710c86a", description: "Hax Enjoyer" },
            { name: "KNA SAYIN #4REEL", invite: "BWptZKj8mN", guildId: "1525845358436028506", icon: "e887897782e8b475e023ee5b64f53703", description: "#4REEL" }
        ];
        const container = document.getElementById('hubContainer');
        allyServers.forEach(server => {
            const iconUrl = `https://cdn.discordapp.com/icons/${server.guildId}/${server.icon}.png?size=128`;
            const card = document.createElement('div');
            card.className = 'server-card';
            card.innerHTML = `
                <div class="server-info"><img class="server-icon" src="${iconUrl}"><div class="server-details"><h4>${server.name}</h4><p>${server.description}</p></div></div>
            `;
            card.onclick = () => {
                document.getElementById('modalName').textContent = server.name;
                document.getElementById('modalInfo').textContent = `Join our community: ${server.description}`;
                document.getElementById('serverModal').style.display = 'flex';
            };
            container.appendChild(card);
        });
    </script>
</body>
</html>
