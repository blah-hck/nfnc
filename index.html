<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFNC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#050508',
                        card: '#0a0a0f',
                        accentPink: '#ff2ee6',
                        accentBlue: '#2ee6ff',
                        accentRed: '#ff3333',
                        accentWhite: '#eeeeee',
                    },
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap');
        body {
            background: #000000;
            background-image: radial-gradient(rgba(40, 40, 60, 0.3) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
            margin: 0;
        }
        .glow-pink {
            box-shadow: 0 0 20px rgba(255, 46, 230, 0.3);
        }
        .glow-blue {
            box-shadow: 0 0 20px rgba(46, 230, 255, 0.3);
        }
        .glow-red {
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.3);
        }
    </style>
</head>
<body class="text-white font-sans">

    <!-- Header -->
    <div class="text-center py-10">

                    <img src="https://i.imgur.com/YJm5Up7.gif" alt="CLEMS" class="w-full h-full object-cover">
                </div>
                <h3 class="text-xl font-bold mt-3">CLEMS</h3>

            <!-- EZEE -->
            <div class="text-center">
                <div class="w-32 h-32 rounded-full overflow-hidden border-2 border-accentRed glow-red">
                    <img src="https://i.imgur.com/38ad0f0.jpeg" alt="EZEE" class="w-full h-full object-cover">
                </div>
                <h3 class="text-xl font-bold mt-3">EZEE</h3>
                <p class="text-accentBlue text-sm">NFNC HANDLER</p>

                </div>

                <p class="text-gray-400 text-sm">NAKATAGO</p>
                <p class="text-gray-500 text-xs">OFFLINE</p>

        </div>
    </div>

    <!-- Music Player -->
    <div class="fixed bottom-4 right-4 bg-card/90 backdrop-blur-md rounded-xl p-4 border border-gray-700 w-64">
        <div class="flex items-center justify-between mb-2">
            <i class="fa fa-pause text-xl"></i>
            <div>
                <p class="text-sm font-semibold">Music</p>
                <p class="text-xs text-gray-400">NOW PLAYING</p>
            </div>
            <i class="fa fa-volume-up text-xl"></i>
        </div>
        <div class="w-full h-1 bg-gray-700 rounded-full overflow-hidden">
            <div class="w-3/4 h-full bg-accentBlue rounded-full"></div>
        </div>
    </div>

    <!-- Background Sound -->
    <audio id="bgSound" loop preload="auto">
        <source src="https://mp3tourl.com/audio/1782135232225-8b3984bc-f7c7-4eae-8b31-a008f1c50ba9.mp3" type="audio/mpeg">
    

    <script>
        const audio = document.getElementById('bgSound');
        audio.volume = 0.3;
        document.addEventListener('click', () => {
            audio.play().catch(e => console.log("Audio:", e));
        }, { once: true });
    </script>

</body>
</html>
