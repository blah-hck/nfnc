<head>
    <meta charset="UTF-8">

    <title>NAKATAGO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
            background: url("https://i.imgur.com/9t8sQrX.gif") center / cover no-repeat fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: clamp(2.2rem, 8vw, 3rem);
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #fff;
            text-transform: uppercase;
            font-family: 'Impact', sans-serif;
        }

        .section-title {
            font-size: 0.9rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 35px 0 20px;
        }

        .grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
        }

        .user-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-wrap {
            position: relative;
            width: 85px;
            height: 85px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #222;
            object-fit: cover;
            background: #111;
        }

        .status-dot {
            position: absolute;
            bottom: 3px;
            right: 3px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #000;
        }

        .status-online { background: #23a55a; }
        .status-idle { background: #f0b232; }
        .status-dnd { background: #f23f43; }
        .status-offline { background: #80848e; }

        .username {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #ccc;
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-family: 'Impact', sans-serif;
            letter-spacing: 2px;
            cursor: pointer;
            gap: 20px;
        }

        #splash .tap-text {
            font-size: 1rem;
            color: #888;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Marquee Members */
        .marquee-wrapper {
            width: 100%;
            overflow: hidden;
            margin-top: 20px;
        }

        .marquee-content {
            display: flex;
            gap: 25px;
            animation: scroll 30s linear infinite;
            width: max-content;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Community Hub */
        .hub-container {
            margin-top: 20px;
            padding: 15px;
            background: rgba(18, 18, 18, 0.7);
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            backdrop-filter: blur(8px);
        }

        .server-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin: 8px 0;
            background: rgba(30, 30, 30, 0.6);
            border-radius: 4px;
            text-align: left;
            cursor: pointer;
        }

        .server-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid #333;
        }

        .server-details h4 {
            font-size: 0.95rem;
            color: #fff;
            margin-bottom: 2px;
        }

        .server-details p {
            font-size: 0.8rem;
            color: #999;
        }

        /* Modal */
        #serverModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
        }

        .modal-content {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            font-family: 'Impact', sans-serif;
            letter-spacing: 2px;
            color: #fff;
        }

        .modal-content h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .modal-content p {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 25px;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 1px;
        }

        .modal-join {
            display: inline-block;
            padding: 10px 25px;
            background: rgba(45, 125, 70, 0.3);
            border: 1px solid rgba(45, 125, 70, 0.5);
            border-radius: 6px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-family: 'Segoe UI', sans-serif;
            transition: all 0.2s ease;
        }

        .modal-join:hover {
            background: rgba(45, 125, 70, 0.6);
            box-shadow: 0 0 12px rgba(45, 125, 70, 0.3);
        }

        .close-modal {
            margin-top: 20px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Segoe UI', sans-serif;
        }

        .close-modal:hover {
            color: #fff;
        }
    </style>
</head>

    <script>
        // Ayusin sirang litrato
        document.querySelectorAll('img').forEach(img => {
            img.onerror = function() {
                if(this.classList.contains('avatar') || this.classList.contains('server-icon')) {
                    this.src = "https://cdn.discordapp.com/embed/avatars/0.png";
                }
            };
        });

        // Splash + Sound

        const audio = document.getElementById('bgAudio');

            splash.style.display = 'none';

        // Community Hub Script
        (function() {
            'use strict';
            const allyServers = [
                { name: "BLAH #ALBTHCKS", invite: "Ty7qb4thSs", guildId: "1504217597900755075", icon: "335c5d2498dbf8b0ab834b022710c86a", members: "99999", status: "999999 ONLINE" }
            ];

            const container = document.getElementById('hubContainer');

            allyServers.forEach(server => {
                const iconUrl = `https://cdn.discordapp.com/icons/${server.guildId}/${server.icon}.png?size=128`;
                const card = document.createElement('div');
                card.className = 'server-card';
                card.innerHTML = `
                    <div class="server-info">
                        <img class="server-icon" src="${iconUrl}" alt="${server.name}">
                        <div class="server-details">
                            <h4>${server.name}</h4>
                            <p>${server.members} • ${server.status}</p>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(server);
                container.appendChild(card);
            });
        })();

        function openModal(server) {
            document.getElementById('modalName').textContent = server.name;
            document.getElementById('modalInfo').textContent = `${server.members} Members • ${server.status}`;
            document.getElementById('modalLink').href = `https://discord.gg/${server.invite}`;
            document.getElementById('serverModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('serverModal').style.display = 'none';
        }

        window.onclick = function(e) {
            const modal = document.getElementById('serverModal');
            if (e.target === modal) modal.style.display = 'none';
        }
    </script>
