    <style>

        body {

        .grid {

        .status {
            position: absolute;
            bottom: 3px;
            right: 3px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #000;
            background: #777;
        }
        .status.on { background: #23a55a; }
        .status.idle { background: #f0b232; }
        .status.dnd { background: #f23f43; }
        .username {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #ccc;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .marquee-wrapper { overflow: hidden; margin-top: 20px; }
        .marquee { display: flex; gap: 25px; animation: scroll 30s linear infinite; width: max-content; }

        .hub {

            padding: 15px;

            border: 1px solid #2a2a2a;
            border-radius: 6px;

        .server {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin: 8px 0;
            background: rgba(30,30,30,0.6);
            border-radius: 4px;
            cursor: pointer;
        }
        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        .bot-card {
            background: rgba(25,25,35,0.9);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-top: 15px;
            text-align: center;
            padding-bottom: 20px;
        }
        .bot-banner {
            width: 100%;
            height: 120px;
            background: url("https://i.imgur.com/Ou2c4I0.gif") center/cover;
        }
        .bot-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #1a1a2e;
            margin: -45px auto 10px;
        }
        .bot-name { font-size: 1.4rem; font-weight: 900; }
        .bot-role { color: #ff4ef5; font-weight: bold; margin: 10px 0; }
        .invite-btn {
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            color: white;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
        }

        /* ✅ AYOS NA PROFILE MODAL - HINDI NAGPAPATONG */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 10000;
        }
        .modal-box {
            background: #18181b;
            border-radius: 12px;
            border: 1px solid #27272a;
            max-width: 320px;
            width: 100%;
            overflow: hidden;
        }
        .prof-banner {
            height: 100px;
            background: linear-gradient(135deg, #5865F2, #EB459E);
            position: relative;
        }
        .close {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 10;
        }
        /* ✅ INILIPAT ANG AVATAR SA TAMANG POSISYON */
        .prof-content {
            padding: 0 20px 20px;
        }
        .prof-avatar-wrap {
            margin-top: -40px;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }
        .prof-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #18181b;
            background: #111;
            position: relative;
        }
        .prof-status {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 3px solid #18181b;
            background: #777;
        }
        .prof-status.on { background: #22c55e; }
        .prof-status.idle { background: #f59e0b; }
        .prof-status.dnd { background: #ef4444; }
        .prof-name {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 2px;
            color: #fff;
        }
        .prof-user {
            color: #aaa;
            margin-bottom: 15px;
        }
        .prof-bio {
            padding-bottom: 15px;
            border-bottom: 1px solid #27272a;
            color: #ddd;
            font-size: 0.95rem;
        }
        .prof-activity {
            margin-top: 15px;
        }
        .act-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .act-box {
            background: #27272a;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #3f3f46;
            color: #d4d4d8;
        }
    </style>
</head>

<!-- ✅ AYOS NA PROFILE MODAL -->
<div id="profileModal" class="modal">
    <div class="modal-box">
        <div class="prof-banner">

        </div>
        <div class="prof-content">
            <div class="prof-avatar-wrap">
                <div class="prof-avatar">
                    <img id="pAvatar" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" src="">
                    <div class="prof-status" id="pStatus"></div>
                </div>
            </div>

            <p class="prof-user" id="pUser"></p>

<!-- ✅ AUDIO -->
<audio id="musika" loop>
    <source src="https://www.image2url.com/r2/default/audio/1782390881799-61def1ab-afbd-453d-ae39-f6aff7d67d0b.mp3">


<script>
// ✅ PAGBUKAS NG SPLASH
function go() {
    document.getElementById('splash').classList.add('fade');
    document.getElementById('main').style.display = 'block';
    const a = document.getElementById('musika');
    a.volume = 0.25;
    a.play().catch(()=>{});
    loadAll();
}

// ✅ PAGBUKAS NG PROFILE - MALINIS NA AYOS
function showProf(data, defAvatar) {
    const u = data?.discord_user;
    const st = data?.discord_status || 'offline';

    if (!u) {
        document.getElementById('pName').innerText = 'Unknown User';
        document.getElementById('pUser').innerText = '@unknown';
        document.getElementById('pBio').innerText = 'Walang impormasyon';
        document.getElementById('pAvatar').src = defAvatar;
    } else {
        document.getElementById('pName').innerText = u.global_name || u.username;
        document.getElementById('pUser').innerText = '@' + u.username;
        document.getElementById('pBio').innerText = u.bio || 'Walang nakalagay na bio.';
        document.getElementById('pAvatar').src = u.avatar ? `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png?size=256` : defAvatar;
    }

    // Status
    const statusEl = document.getElementById('pStatus');
    statusEl.className = 'prof-status';
    if(st==='online') statusEl.classList.add('on');
    else if(st==='idle') statusEl.classList.add('idle');
    else if(st==='dnd') statusEl.classList.add('dnd');

    // Activity
    let actHtml = '';
    if(data?.activities?.length>0){
        data.activities.forEach(act=>{
            let icon = act.type===2 ? '🎵' : act.type===0 ? '🎮' : '🔹';
            actHtml += `<div class="act-box"><b>${icon} ${act.name}</b><br>${act.details||''} ${act.state||''}</div>`;
        });
    } else actHtml = '<div class="act-box">Walang aktibidad</div>';
    document.getElementById('pAct').innerHTML = actHtml;

    document.getElementById('profileModal').style.display = 'flex';
}

function closeProf(){ document.getElementById('profileModal').style.display='none'; }

// ✅ GUMAWA NG USER CARD
async function card(userId) {
    const el = document.createElement('div');
    el.className = 'user-card';
    let avatar = 'https://cdn.discordapp.com/embed/avatars/0.png';
    let name = '...';
    let statusClass = '';
    let userData = null;

    try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
        const json = await res.json();
        if(json.success){
            userData = json.data;
            const u = json.data.discord_user;
            if(u){
                name = u.global_name || u.username;
                if(u.avatar) avatar = `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png?size=128`;
            }
            const s = json.data.discord_status;
            if(s==='online') statusClass='on';
            else if(s==='idle') statusClass='idle';
            else if(s==='dnd') statusClass='dnd';
        } else name = 'Unknown';
    } catch { name = 'Unknown'; }

    el.innerHTML = `
        <div class="avatar-wrap">
            <img class="avatar" src="${avatar}">
            <div class="status ${statusClass}"></div>
        </div>
        <div class="username">${name}</div>
    `;

    el.onclick = () => {
        if(userId === MY_ID) window.open(MY_LINK, '_blank');
        else showProf(userData, avatar);
    };
    return el;
}

async function draw(id, list) {
    const wrap = document.getElementById(id);
    for(const u of list) wrap.appendChild(await card(u.id));
}
async function drawMarq(list) {
    const wrap = document.getElementById('days');
    for(let i=0;i<2;i++) for(const u of list) wrap.appendChild(await card(u.id));
}

async function loadAll() {
    await draw('top', listahan.top);
    await draw('above', listahan.above);
    await draw('shotta', listahan.shotta);
    await drawMarq(listahan.days);

    // Servers
    const servers = [
        {n:"BLAH #ALBTHAX",i:"Ty7qb4thSs",g:"1504217597900755075",ico:"335c5d2498dbf8b0ab834b022710c86a",d:"Hax Enjoyer"},
        {n:"KNA SAYIN #4REEL",i:"BWptZKj8mN",g:"1525845358436028506",ico:"e887897782e8b475e023ee5b64f53703",d:"#4REEL"}
    ];
    const hub = document.getElementById('hub');
    servers.forEach(s=>{
        const sx = document.createElement('div'); sx.className='server';
        sx.innerHTML = `
            <div style="display:flex;align-items:center;gap:12px;">
                <img class="server-icon" src="https://cdn.discordapp.com/icons/${s.g}/${s.ico}.png?size=128">
                <div><b>${s.n}</b><br><small style="color:#aaa">${s.d}</small></div>
            </div>
        `;
        sx.onclick = ()=> window.open(`https://discord.gg/${s.i}`, '_blank');
        hub.appendChild(sx);
    });
}
</script>
